<!DOCTYPE html>
<html>
<head>
  <title>FAI Review Debug</title>
</head>
<body>

<h2>FAI Review Debug</h2>

<button id="check">Check Storage</button>
<button id="send">Send To Backend</button>

<h3>Stored Review</h3>
<pre id="output"></pre>

<h3>Backend Response</h3>
<pre id="response"></pre>

<script>

const output =
document.getElementById("output");

const responseBox =
document.getElementById("response");

document.getElementById("check").onclick = () => {

  const reviewData =
    localStorage.getItem("fai_review");

  const review =
    JSON.parse(reviewData || "[]");

  output.textContent =
    JSON.stringify(review, null, 2);

  console.log("RAW:", reviewData);
  console.log("PARSED:", review);
};

document.getElementById("send").onclick = async () => {

  try {

    const reviewData =
      localStorage.getItem("fai_review");

    const review =
      JSON.parse(reviewData || "[]");

    console.log("📚 REVIEW:", review);

    const payload = {
      userId: "debug-user",
      messages: [],
      prompt: `
You are FAI helping a student.

Give short but very clear explanations.

For each question:
- Correct answer
- Why it's correct
- Simple explanation

Quiz Review:
${JSON.stringify(review, null, 2)}
      `.trim()
    };

    console.log("📦 PAYLOAD:", payload);

    responseBox.textContent =
      "Sending request...";

    const res = await fetch(
      "https://fweb-backend.onrender.com/fai",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      }
    );

    const text =
      await res.text();

    console.log("📨 RAW RESPONSE:", text);

    try {

      const json =
        JSON.parse(text);

      responseBox.textContent =
        JSON.stringify(json, null, 2);

    } catch {

      responseBox.textContent =
        text;

    }

  } catch (err) {

    console.error(err);

    responseBox.textContent =
      "ERROR:\n\n" + err.message;

  }

};

</script>

</body>
</html>
