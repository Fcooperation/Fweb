<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FCompressor Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    button {
      padding: 12px 18px;
      margin-top: 12px;
      cursor: pointer;
      margin-right: 10px;
    }

    #log {
      margin-top: 20px;
      background: #222;
      border-radius: 10px;
      padding: 12px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    video {
      width: 100%;
      max-width: 350px;
      margin-top: 15px;
      border-radius: 12px;
      display: block;
    }
  </style>
</head>

<body>

<h2>🔥 FCompressor Test</h2>

<input type="file" id="fileInput" accept="video/*">

<br>

<button id="downloadBtn">
  Download FCompressor (~20MB)
</button>

<button id="compressBtn" disabled>
  Compress to 720p
</button>

<div id="log">Waiting...</div>

<h3>Original</h3>
<video id="originalVideo" controls></video>

<h3>Compressed</h3>
<video id="compressedVideo" controls></video>

<script type="module">

// ✅ FIXED IMPORT (IMPORTANT)
import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
import { fetchFile } from "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js";

const ffmpeg = new FFmpeg();

const logBox = document.getElementById("log");
const downloadBtn = document.getElementById("downloadBtn");
const compressBtn = document.getElementById("compressBtn");

let ready = false;

function log(msg) {
  console.log(msg);
  logBox.textContent += "\n" + msg;
  logBox.scrollTop = logBox.scrollHeight;
}

/* ---------------- DOWNLOAD FFMPEG ---------------- */

downloadBtn.onclick = async () => {

  if (ready) return;

  downloadBtn.disabled = true;
  logBox.textContent = "";

  log("⏳ Loading FCompressor core...");

  try {

    await ffmpeg.load({
      coreURL: "/fcompressor/ffmpeg-core.js",
      wasmURL: "/fcompressor/ffmpeg-core.wasm"
    });

    ready = true;

    downloadBtn.textContent = "Downloaded ✔";
    compressBtn.disabled = false;

    log("✔ FCompressor ready (cached in browser)");
    log("✔ You can now compress videos");

  } catch (err) {

    console.error(err);

    downloadBtn.disabled = false;
    downloadBtn.textContent = "Download Failed";

    log("ERROR: " + err.message);
  }
};

/* ---------------- COMPRESS VIDEO ---------------- */

compressBtn.onclick = async () => {

  if (!ready) {
    alert("Download FCompressor first");
    return;
  }

  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Select a video first");
    return;
  }

  compressBtn.disabled = true;

  document.getElementById("originalVideo").src =
    URL.createObjectURL(file);

  logBox.textContent = "";

  try {

    const sizeMB = file.size / 1024 / 1024;
    log("Original: " + sizeMB.toFixed(2) + " MB");

    await ffmpeg.writeFile(
      "input.mp4",
      await fetchFile(file)
    );

    log("Starting compression...");

    ffmpeg.on("progress", ({ progress }) => {
      const percent = Math.round(progress * 100);
      compressBtn.textContent = `Compressing ${percent}%`;
    });

    await ffmpeg.exec([
      "-i", "input.mp4",

      "-vf", "scale=-2:720",
      "-r", "30",

      "-c:v", "libx264",
      "-b:v", "1M",
      "-maxrate", "1M",
      "-bufsize", "2M",

      "-preset", "veryfast",

      "-c:a", "aac",
      "-b:a", "128k",

      "output.mp4"
    ]);

    const data = await ffmpeg.readFile("output.mp4");

    const blob = new Blob([data.buffer], {
      type: "video/mp4"
    });

    const outMB = blob.size / 1024 / 1024;

    const saved = (
      ((file.size - blob.size) / file.size) * 100
    ).toFixed(1);

    log("✔ Compression done");
    log("Compressed: " + outMB.toFixed(2) + " MB");
    log("Saved: " + saved + "%");

    document.getElementById("compressedVideo").src =
      URL.createObjectURL(blob);

    compressBtn.textContent = "Done ✔";

  } catch (err) {

    console.error(err);

    log("ERROR: " + err.message);

    compressBtn.textContent = "Failed";
  }

  compressBtn.disabled = false;
};

</script>

</body>
</html>
