<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FVIDS Canvas Compressor</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    button {
      padding: 12px 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    #log {
      margin-top: 15px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    video {
      width: 300px;
      margin-top: 10px;
      border-radius: 10px;
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>

<h2>🔥 Lightweight Video Compressor (Canvas)</h2>

<input type="file" id="file" accept="video/*">

<br>

<button onclick="compress()">Compress Video</button>

<div id="log">Waiting...</div>

<h3>Original</h3>
<video id="original" controls></video>

<h3>Compressed</h3>
<video id="compressed" controls></video>

<canvas id="canvas"></canvas>

<script>

const logBox = document.getElementById("log");

function log(msg) {
  console.log(msg);
  logBox.textContent += "\n" + msg;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function compress() {

  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a video");

  logBox.textContent = "";

  const video = document.getElementById("original");
  video.src = URL.createObjectURL(file);

  log("Loading video...");

  await video.play().catch(()=>{});
  video.pause();

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  video.onloadedmetadata = async () => {

    const width = 1280;
    const height = 720;

    canvas.width = width;
    canvas.height = height;

    log("Starting compression...");

    const stream = canvas.captureStream(30);
    const recorder = new MediaRecorder(stream, {
      mimeType: "video/webm;codecs=vp9",
      videoBitsPerSecond: 1000000 // 1Mbps
    });

    let chunks = [];

    recorder.ondataavailable = e => {
      if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {

      const blob = new Blob(chunks, { type: "video/webm" });

      log("Compression complete ✔");

      const url = URL.createObjectURL(blob);
      document.getElementById("compressed").src = url;

      const saved = ((file.size - blob.size) / file.size * 100).toFixed(1);

      log(`Saved: ${saved}%`);
    };

    recorder.start();

    let duration = video.duration;
    let currentTime = 0;

    function drawFrame() {

      if (currentTime >= duration) {
        recorder.stop();
        return;
      }

      video.currentTime = currentTime;

      video.onseeked = () => {
        ctx.drawImage(video, 0, 0, width, height);
      };

      currentTime += 1 / 30;
    }

    const interval = setInterval(drawFrame, 1000 / 30);

    setTimeout(() => {
      clearInterval(interval);
      recorder.stop();
    }, duration * 1000 + 500);

  };

}

</script>

</body>
</html>
