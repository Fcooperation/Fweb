<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FVIDS Canvas Compressor</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    button {
      padding: 12px 16px;
      margin-top: 10px;
      cursor: pointer;
    }

    #log {
      margin-top: 15px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    video {
      width: 300px;
      margin-top: 10px;
      border-radius: 10px;
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>

<h2>🔥 Lightweight Video Compressor (Canvas)</h2>

<input type="file" id="file" accept="video/*">

<br>

<button onclick="compress()">Compress Video</button>

<div id="log">Waiting...</div>

<h3>Original</h3>
<video id="original" controls></video>

<h3>Compressed</h3>
<video id="compressed" controls></video>
<h3>Temporary Link</h3>
<a id="tempLink" target="_blank"></a>
  
<canvas id="canvas"></canvas>

<script>

const logBox = document.getElementById("log");

function log(msg) {
  console.log(msg);
  logBox.textContent += "\n" + msg;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}
async function compress() {

  const file = document.getElementById("file").files[0];
  if (!file) return alert("Select a video");

  logBox.textContent = "";

  const video = document.getElementById("original");

  const url = URL.createObjectURL(file);
  video.src = url;

  log("Loading video metadata...");

  await new Promise((resolve) => {

    video.onloadedmetadata = () => {
      resolve();
    };

    // fallback in case it's already loaded
    if (video.readyState >= 1) {
      resolve();
    }
  });

  log("Metadata loaded ✔");
  log("Starting compression...");

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const width = 1280;
  const height = 720;

  canvas.width = width;
  canvas.height = height;

  const stream = canvas.captureStream(30);

  const recorder = new MediaRecorder(stream, {
    mimeType: "video/webm;codecs=vp9",
    videoBitsPerSecond: 1000000
  });

  let chunks = [];

  recorder.ondataavailable = (e) => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {

  const blob = new Blob(chunks, { type: "video/webm" });

  log("Compression complete ✔");

  const url = URL.createObjectURL(blob);

  const compressedVideo = document.getElementById("compressed");

  // reset video
  compressedVideo.pause();
  compressedVideo.removeAttribute("src");
  compressedVideo.load();

  compressedVideo.src = url;

  compressedVideo.onloadedmetadata = () => {
    compressedVideo.play().catch(() => {});
  };

  // 👉 TEMP LINK DISPLAY
  const linkBox = document.getElementById("tempLink");
  linkBox.href = url;
  linkBox.textContent = "Open compressed video in new tab";

  // optional: open automatically (comment out if annoying)
  // window.open(url, "_blank");

  const saved = ((file.size - blob.size) / file.size * 100).toFixed(1);

  log(`Saved: ${saved}%`);
};

  recorder.start();

  const duration = video.duration;
  let currentTime = 0;

  function draw() {

    if (currentTime >= duration) {
      recorder.stop();
      return;
    }

    video.currentTime = currentTime;

    video.onseeked = () => {
      ctx.drawImage(video, 0, 0, width, height);
    };

    currentTime += 1 / 30;
  }

  const interval = setInterval(draw, 1000 / 30);

  setTimeout(() => {
    clearInterval(interval);
    recorder.stop();
  }, duration * 1000 + 800);
}

</script>

</body>
</html>
