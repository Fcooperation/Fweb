<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 FCompressor Test</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }
        .status-box { background: #f4f4f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .progress-container { width: 100%; background-color: #ddd; border-radius: 4px; margin-top: 10px; display: none; }
        .progress-bar { width: 0%; height: 20px; background-color: #4CAF50; text-align: center; line-height: 20px; color: white; border-radius: 4px; font-size: 12px; transition: width 0.1s linear; }
        .error { color: red; font-weight: bold; }
        .success { color: green; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🔥 FCompressor Test</h1>
    
    <div class="status-box">
        <h3>⏳ Core Engine Status</h3>
        <p id="status-text">Initializing...</p>
        
        <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar">0%</div>
        </div>
    </div>

    <!-- Script uses type="module" to allow modern import/export structure -->
    <script type="module">
        import { FFmpeg } from 'https://unpkg.com';

        // Using CDN URLs as source, but we will download and cache them locally
        const CORE_VERSION = '0.12.10';
        const FILES_TO_CACHE = {
            'ffmpeg-core.js': `https://unpkg.com{CORE_VERSION}/dist/esm/ffmpeg-core.js`,
            'ffmpeg-core.wasm': `https://unpkg.com{CORE_VERSION}/dist/esm/ffmpeg-core.wasm`,
            'ffmpeg-core.worker.js': `https://unpkg.com{CORE_VERSION}/dist/esm/ffmpeg-core.worker.js`
        };

        const statusText = document.getElementById('status-text');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        // Helper: Download a file with progress tracking
        async function downloadWithProgress(url, filename) {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const contentLength = response.headers.get('content-length');
            if (!contentLength) {
                console.warn(`No content-length header for ${filename}. Progress bar may not work correctly.`);
            }
            
            const totalBytes = parseInt(contentLength || '0', 10);
            let downloadedBytes = 0;

            const reader = response.body.getReader();
            const chunks = [];

            while(true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                chunks.push(value);
                downloadedBytes += value.length;

                if (totalBytes > 0) {
                    const percent = Math.round((downloadedBytes / totalBytes) * 100);
                    statusText.innerText = `Downloading ${filename}...`;
                    progressBar.style.width = `${percent}%`;
                    progressBar.innerText = `${percent}%`;
                }
            }

            return new Blob(chunks);
        }

        // Helper: Get or save files in the browser's Origin Private File System
        async function getLocalFileBlob(filename, downloadUrl = null) {
            const root = await navigator.storage.getDirectory();
            
            try {
                // Check if file already exists locally
                const fileHandle = await root.getFileHandle(filename);
                const file = await fileHandle.getFile();
                console.log(`✨ Loaded ${filename} from local browser cache.`);
                return file;
            } catch (e) {
                // File does not exist, download and cache it now
                if (!downloadUrl) return null;
                
                progressContainer.style.display = 'block';
                const blob = await downloadWithProgress(downloadUrl, filename);
                
                const fileHandle = await root.getFileHandle(filename, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();
                
                console.log(`💾 Saved ${filename} to local browser storage.`);
                return blob;
            }
        }

        async function initFCompressor() {
            try {
                statusText.innerText = "Checking local application storage...";
                
                // 1. Fetch or download files into local storage
                const jsBlob = await getLocalFileBlob('ffmpeg-core.js', FILES_TO_CACHE['ffmpeg-core.js']);
                const wasmBlob = await getLocalFileBlob('ffmpeg-core.wasm', FILES_TO_CACHE['ffmpeg-core.wasm']);
                const workerBlob = await getLocalFileBlob('ffmpeg-core.worker.js', FILES_TO_CACHE['ffmpeg-core.worker.js']);

                statusText.innerText = "Generating local asset URLs...";
                progressContainer.style.display = 'none'; // Hide progress bar once downloaded

                // 2. Convert local Blobs to Object URLs to bypass origin/worker strict policies
                const coreURL = URL.createObjectURL(new Blob([jsBlob], { type: 'text/javascript' }));
                const wasmURL = URL.createObjectURL(new Blob([wasmBlob], { type: 'application/wasm' }));
                const workerURL = URL.createObjectURL(new Blob([workerBlob], { type: 'text/javascript' }));

                statusText.innerText = "Booting FFmpeg Web Worker core...";
                const ffmpeg = new FFmpeg();
                
                // 3. Load FFmpeg using your offline local object URLs
                await ffmpeg.load({ coreURL, wasmURL, workerURL });

                statusText.innerHTML = "<span class='success'>✅ FCompressor Core Ready! Running locally from browser storage.</span>";
            } catch (error) {
                console.error(error);
                statusText.innerHTML = `<span class='error'>❌ Initialization Failed: ${error.message}</span>`;
            }
        }

        // Start initialization process on page load
        window.addEventListener('DOMContentLoaded', initFCompressor);
    </script>
</body>
</html>
