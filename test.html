<!DOCTYPE html>
<html>
<head>
  <title>FCHAT STORAGE TEST</title>

  <style>
    body{
      font-family:Arial;
      padding:20px;
      background:#f5f5f5;
    }

    pre{
      background:white;
      padding:15px;
      border-radius:10px;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>

<h2>FCHAT_STORAGE_KEY Data</h2>

<pre id="output">Loading...</pre>

<script>

// same key used in your app
const FCHAT_STORAGE_KEY = "fchat_messages";

// load data
const data =
  JSON.parse(
    localStorage.getItem(FCHAT_STORAGE_KEY)
  ) || [];

// show on screen
document.getElementById("output").textContent =
  JSON.stringify(data, null, 2);

// also log in console
console.log(data);

</script>

</body>
</html>
