<!DOCTYPE html>
<html>
<head>
  <title>FVideo Compressor Test</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    video {
      width: 320px;
      margin-top: 10px;
      border-radius: 10px;
      display: block;
    }

    #log {
      margin-top: 15px;
      background: #222;
      padding: 10px;
      border-radius: 8px;
      min-height: 120px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

<h2>🔥 Video Compression Test (720p / 1Mbps)</h2>

<input type="file" id="file" accept="video/*" />
<br>

<button onclick="compressVideo()">Compress Video</button>

<div id="log">Waiting...</div>

<h3>Original</h3>
<video id="original" controls></video>

<h3>Compressed</h3>
<video id="compressed" controls></video>

<script type="module">
import { createFFmpeg, fetchFile } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/+esm";

const ffmpeg = createFFmpeg({
  log: false,
  corePath: "/fcompressor/ffmpeg-core.js"
});

const logBox = document.getElementById("log");

function log(msg) {
  logBox.innerText += "\n" + msg;
}

function setLog(msg) {
  logBox.innerText = msg;
}

window.compressVideo = async () => {
  const file = document.getElementById("file").files[0];

  if (!file) return alert("Select a video first");

  // reset logs
  logBox.innerText = "";

  document.getElementById("original").src =
    URL.createObjectURL(file);

  setLog("📦 Preparing compression...");

  const originalSize = file.size / (1024 * 1024);
  log(`Original size: ${originalSize.toFixed(2)} MB`);

  if (!ffmpeg.isLoaded()) {
    log("⚙️ Loading FFmpeg...");
    await ffmpeg.load();
  }

  setLog("⚡ Compressing video...");

  const input = "input.mp4";
  const output = "output.mp4";

  ffmpeg.FS("writeFile", input, await fetchFile(file));

  let last = 0;

  ffmpeg.setProgress(({ ratio }) => {
    const percent = Math.round(ratio * 100);

    if (percent !== last) {
      last = percent;
      setLog(`⚡ Compressing... ${percent}%`);
    }
  });

  await ffmpeg.run(
    "-i", input,

    // 🔥 VIDEO SETTINGS (LOCKED)
    "-vf", "scale=1280:720",
    "-r", "30",
    "-b:v", "1000k",

    // H.264 compression
    "-c:v", "libx264",
    "-preset", "veryfast",
    "-crf", "28",

    // AUDIO
    "-c:a", "aac",
    "-b:a", "128k",

    output
  );

  const data = ffmpeg.FS("readFile", output);

  const blob = new Blob([data.buffer], {
    type: "video/mp4"
  });

  const compressedSize = blob.size / (1024 * 1024);

  const saved = (
    ((file.size - blob.size) / file.size) * 100
  ).toFixed(2);

  setLog("✅ Done!");
  log(`Compressed size: ${compressedSize.toFixed(2)} MB`);
  log(`Saved: ${saved}%`);

  const url = URL.createObjectURL(blob);
  document.getElementById("compressed").src = url;
};
</script>

</body>
</html>
