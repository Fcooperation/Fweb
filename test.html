<!DOCTYPE html>
<html>
<head>
  <title>All LocalStorage Test</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box{
      background:white;
      padding:15px;
      margin-bottom:20px;
      border-radius:10px;
    }

    pre{
      white-space:pre-wrap;
      word-break:break-word;
      overflow:auto;
    }

    h2{
      margin-top:0;
    }
  </style>
</head>
<body>

<h1>All LocalStorage Data</h1>

<div id="container"></div>

<script>

const container =
  document.getElementById("container");

// loop through ALL localStorage items
for (let i = 0; i < localStorage.length; i++) {

  const key = localStorage.key(i);

  let value =
    localStorage.getItem(key);

  // try formatting JSON
  try {
    value = JSON.stringify(
      JSON.parse(value),
      null,
      2
    );
  } catch(err) {}

  const box =
    document.createElement("div");

  box.className = "box";

  box.innerHTML = `
    <h2>${key}</h2>
    <pre>${value}</pre>
  `;

  container.appendChild(box);
}

console.log(localStorage);

</script>

</body>
</html>
