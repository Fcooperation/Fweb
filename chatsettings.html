<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fchat Chat Settings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 20px;
  }

  h1 { font-size: 32px; margin-bottom: 6px; }
  .subtext { font-size: 14px; color: #007bff; margin-bottom: 20px; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    max-width: 500px;
    margin: 0 auto 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .section-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }

  .themes { display: flex; gap: 12px; flex-wrap: wrap; }
  .theme-box {
    width: 100px;
    height: 60px;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    border: 2px solid transparent;
  }
  .theme-box.selected { border-color: #007bff; }

  .theme-name {
    position: absolute;
    bottom: 6px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    font-weight: bold;
    color: white;
    text-shadow: 0 1px 2px black;
  }

  .black { background: #000; }
  .pink { background: #ff69b4; }
  .green { background: #25d366; }
  .skyblue { background: #87ceeb; }
  .purple { background: #9b59b6; }

  .chat-preview {
    margin-top: 12px;
    width: 100%;
    height: 180px;
    border-radius: 12px;
    background: white;
    position: relative;
    overflow: hidden;
    padding: 10px;
    box-sizing: border-box;
    background-size: cover;
    background-position: center;
  }

  .sent-preview {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 18px 18px 18px 4px;
    color: white;
    font-size: 14px;
    position: absolute;
    right: 10px;
    top: 14px;
    background: black;
  }

  input[type="file"] { margin-top: 10px; }

  .wallpaper-previews {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .wallpaper-preview-square {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    border: 2px solid transparent;
    overflow: hidden;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .wallpaper-preview-square.selected {
    border-color: #007bff;
  }

  /* DELETE BUTTON */
  .delete-btn {
    position: absolute;
    top: 2px;
    right: 4px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    border-radius: 50%;
    width: 16px;
    height: 16px;
    font-size: 12px;
    line-height: 14px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>Chat Settings</h1>
<div class="subtext">Choose how your chats look</div>

<div class="card">
  <div class="section-title">Theme</div>
  <div class="themes">
    <div class="theme-box black" data-theme="black"><div class="theme-name">Black</div></div>
    <div class="theme-box pink" data-theme="pink"><div class="theme-name">Pink</div></div>
    <div class="theme-box green" data-theme="green"><div class="theme-name">Green</div></div>
    <div class="theme-box skyblue" data-theme="skyblue"><div class="theme-name">Sky Blue</div></div>
    <div class="theme-box purple" data-theme="purple"><div class="theme-name">Purple</div></div>
  </div>
</div>

<div class="card">
  <div class="section-title">Chat Background</div>

  <input type="file" id="wallpaper-input" accept="image/*">

  <div class="wallpaper-previews" id="wallpaper-previews"></div>

  <div class="chat-preview" id="chat-preview">
    <div class="sent-preview" id="sent-preview">
      Customize your chat theme
    </div>
  </div>
</div>

<script>
/* ===================== STATE ===================== */
const themeColors = {
  black: "#000000",
  pink: "#ff69b4",
  green: "#25d366",
  skyblue: "#87ceeb",
  purple: "#9b59b6"
};

const themeBoxes = document.querySelectorAll(".theme-box");
const sentPreview = document.getElementById("sent-preview");
const chatPreview = document.getElementById("chat-preview");
const wallpaperInput = document.getElementById("wallpaper-input");
const wallpaperPreviews = document.getElementById("wallpaper-previews");

let currentTheme = localStorage.getItem("chatTheme") || "black";
let savedWallpapers = JSON.parse(localStorage.getItem("chatWallpapers") || "[]");
let currentWallpaper = localStorage.getItem("chatWallpaper") || null;

/* ===================== IMAGE COMPRESSION ===================== */
function compressImage(file, callback) {
  const reader = new FileReader();
  const img = new Image();

  reader.onload = () => img.src = reader.result;

  img.onload = () => {
    const canvas = document.createElement("canvas");
    const maxWidth = 720;
    const scale = Math.min(1, maxWidth / img.width);

    canvas.width = img.width * scale;
    canvas.height = img.height * scale;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    callback(canvas.toDataURL("image/jpeg", 0.7));
  };

  reader.readAsDataURL(file);
}

/* ===================== THEME ===================== */
function updateThemeUI() {
  themeBoxes.forEach(box =>
    box.classList.toggle("selected", box.dataset.theme === currentTheme)
  );
  sentPreview.style.background = themeColors[currentTheme];
}

themeBoxes.forEach(box => {
  box.onclick = () => {
    currentTheme = box.dataset.theme;
    localStorage.setItem("chatTheme", currentTheme);
    updateThemeUI();
  };
});

/* ===================== WALLPAPERS ===================== */
function renderWallpaperPreviews() {
  wallpaperPreviews.innerHTML = "";

  // White default
  const white = document.createElement("div");
  white.className = "wallpaper-preview-square";
  white.style.background = "white";
  if (!currentWallpaper) white.classList.add("selected");

  white.onclick = () => {
    currentWallpaper = null;
    chatPreview.style.backgroundImage = "";
    chatPreview.style.backgroundColor = "white";
    localStorage.setItem("chatWallpaper", "");
    renderWallpaperPreviews();
  };

  wallpaperPreviews.appendChild(white);

  savedWallpapers.forEach((dataUrl, index) => {
    const square = document.createElement("div");
    square.className = "wallpaper-preview-square";
    square.style.backgroundImage = `url(${dataUrl})`;
    if (currentWallpaper === dataUrl) square.classList.add("selected");

    square.onclick = () => {
      currentWallpaper = dataUrl;
      chatPreview.style.backgroundImage = `url(${dataUrl})`;
      chatPreview.style.backgroundColor = "";
      localStorage.setItem("chatWallpaper", dataUrl);
      renderWallpaperPreviews();
    };

    const del = document.createElement("button");
    del.className = "delete-btn";
    del.textContent = "×";
    del.onclick = (e) => {
  e.stopPropagation();

  const wasSelected = currentWallpaper === dataUrl;

  // Remove wallpaper
  savedWallpapers.splice(index, 1);
  localStorage.setItem("chatWallpapers", JSON.stringify(savedWallpapers));

  if (wasSelected) {
    // Pick previous, or next, or default
    if (savedWallpapers[index - 1]) {
      currentWallpaper = savedWallpapers[index - 1];
    } else if (savedWallpapers[index]) {
      currentWallpaper = savedWallpapers[index];
    } else {
      currentWallpaper = null;
    }

    // Apply to preview
    if (currentWallpaper) {
      chatPreview.style.backgroundImage = `url(${currentWallpaper})`;
      chatPreview.style.backgroundColor = "";
      localStorage.setItem("chatWallpaper", currentWallpaper);
    } else {
      chatPreview.style.backgroundImage = "";
      chatPreview.style.backgroundColor = "white";
      localStorage.setItem("chatWallpaper", "");
    }
  }

  renderWallpaperPreviews();
};

    square.appendChild(del);
    wallpaperPreviews.appendChild(square);
  });
}

/* Upload wallpaper (limit 10) */
wallpaperInput.addEventListener("change", () => {
  if (savedWallpapers.length >= 10) {
    alert("You can only save up to 10 wallpapers");
    wallpaperInput.value = "";
    return;
  }

  const file = wallpaperInput.files[0];
  if (!file) return;

  compressImage(file, (dataUrl) => {
    savedWallpapers.push(dataUrl);
    localStorage.setItem("chatWallpapers", JSON.stringify(savedWallpapers));
    currentWallpaper = dataUrl;
    localStorage.setItem("chatWallpaper", dataUrl);
    chatPreview.style.backgroundImage = `url(${dataUrl})`;
    chatPreview.style.backgroundColor = "";
    renderWallpaperPreviews();
  });
});

/* INIT */
updateThemeUI();
renderWallpaperPreviews();
if (currentWallpaper)
  chatPreview.style.backgroundImage = `url(${currentWallpaper})`;
else
  chatPreview.style.backgroundColor = "white";
</script>

</body>
</html>
