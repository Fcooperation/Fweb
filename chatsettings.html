<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fchat Chat Settings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 20px;
  }

  h1 { font-size: 32px; margin-bottom: 6px; }
  .subtext { font-size: 14px; color: #007bff; margin-bottom: 20px; }

  .card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    max-width: 500px;
    margin: 0 auto 20px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .section-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }

  /* Themes */
  .themes { display: flex; gap: 12px; flex-wrap: wrap; }
  .theme-box { width: 100px; height: 60px; border-radius: 10px; cursor: pointer; position: relative; border: 2px solid transparent; }
  .theme-box.selected { border-color: #007bff; }
  .theme-name { position: absolute; bottom: 6px; left: 0; right: 0; text-align: center; font-size: 12px; font-weight: bold; color: white; text-shadow: 0 1px 2px black; }

  .black { background: #000; }
  .pink { background: #ff69b4; }
  .green { background: #25d366; }
  .skyblue { background: #87ceeb; }
  .purple { background: #9b59b6; }

  /* Chat Preview */
  .chat-preview {
    margin-top: 12px;
    width: 100%;
    height: 180px;
    border-radius: 12px;
    background: white; /* default */
    position: relative;
    overflow: hidden;
    padding: 10px;
    box-sizing: border-box;
    background-size: cover;
    background-position: center;
  }

  .sent-preview {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 18px 18px 18px 4px;
    color: white;
    font-size: 14px;
    position: absolute;
    right: 10px;
    top: 14px;
    background: black;
  }

  input[type="file"] { margin-top: 10px; }

  /* Wallpaper Previews */
  .wallpaper-previews {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .wallpaper-preview-square {
    width: 60px;
    height: 60px;
    border-radius: 8px;
    border: 2px solid transparent;
    overflow: hidden;
    cursor: pointer;
    background-size: cover;
    background-position: center;
  }

  .wallpaper-preview-square.selected { border-color: #007bff; }
</style>
</head>

<body>

<h1>Chat Settings</h1>
<div class="subtext">Choose how your chats look</div>

<!-- THEME CARD -->
<div class="card">
  <div class="section-title">Theme</div>
  <div class="themes">
    <div class="theme-box black" data-theme="black"><div class="theme-name">Black</div></div>
    <div class="theme-box pink" data-theme="pink"><div class="theme-name">Pink</div></div>
    <div class="theme-box green" data-theme="green"><div class="theme-name">Green</div></div>
    <div class="theme-box skyblue" data-theme="skyblue"><div class="theme-name">Sky Blue</div></div>
    <div class="theme-box purple" data-theme="purple"><div class="theme-name">Purple</div></div>
  </div>
</div>

<!-- WALLPAPER + CHAT BACKGROUND -->
<div class="card">
  <div class="section-title">Chat Background</div>

  <!-- File input to add images -->
  <input type="file" id="wallpaper-input" accept="image/*">

  <!-- Previews row -->
  <div class="wallpaper-previews" id="wallpaper-previews">
    <!-- White default square -->
    <div class="wallpaper-preview-square" id="white-background" style="background:white;" title="Default White"></div>
  </div>

  <!-- Mock chat preview -->
  <div class="chat-preview" id="chat-preview">
    <div class="sent-preview" id="sent-preview">
      Customize your chat theme
    </div>
  </div>
</div>

<script>
/* ===================== STATE ===================== */
const themeColors = {
  black: "#000000",
  pink: "#ff69b4",
  green: "#25d366",
  skyblue: "#87ceeb",
  purple: "#9b59b6"
};

const themeBoxes = document.querySelectorAll(".theme-box");
const sentPreview = document.getElementById("sent-preview");
const chatPreview = document.getElementById("chat-preview");
const wallpaperInput = document.getElementById("wallpaper-input");
const wallpaperPreviews = document.getElementById("wallpaper-previews");

let currentTheme = localStorage.getItem("chatTheme") || "black";
let savedWallpapers = JSON.parse(localStorage.getItem("chatWallpapers") || "[]");
let currentWallpaper = localStorage.getItem("chatWallpaper") || null;

/* ===================== THEME ===================== */
function updateThemeUI() {
  themeBoxes.forEach(box => {
    box.classList.toggle("selected", box.dataset.theme === currentTheme);
  });
  sentPreview.style.background = themeColors[currentTheme];
}

themeBoxes.forEach(box => {
  box.addEventListener("click", () => {
    currentTheme = box.dataset.theme;
    localStorage.setItem("chatTheme", currentTheme);
    updateThemeUI();
  });
});

/* ===================== WALLPAPER / BACKGROUND ===================== */
function renderWallpaperPreviews() {
  // always keep the white default first
  wallpaperPreviews.innerHTML = `<div class="wallpaper-preview-square" id="white-background" style="background:white;" title="Default White"></div>`;

  // add saved wallpapers
  savedWallpapers.forEach((dataUrl) => {
    const square = document.createElement("div");
    square.className = "wallpaper-preview-square";
    square.style.backgroundImage = `url(${dataUrl})`;
    square.title = "Custom Wallpaper";
    if (currentWallpaper === dataUrl) square.classList.add("selected");
    square.addEventListener("click", () => {
      currentWallpaper = dataUrl;
      chatPreview.style.backgroundImage = `url(${dataUrl})`;
      chatPreview.style.backgroundColor = ''; // remove solid color
      localStorage.setItem("chatWallpaper", currentWallpaper);
      document.querySelectorAll(".wallpaper-preview-square").forEach(sq => sq.classList.remove("selected"));
      square.classList.add("selected");
    });
    wallpaperPreviews.appendChild(square);
  });

  // White default click
  const whiteSquare = document.getElementById("white-background");
  whiteSquare.addEventListener("click", () => {
    currentWallpaper = null;
    chatPreview.style.backgroundImage = '';
    chatPreview.style.backgroundColor = 'white';
    localStorage.setItem("chatWallpaper", '');
    document.querySelectorAll(".wallpaper-preview-square").forEach(sq => sq.classList.remove("selected"));
    whiteSquare.classList.add("selected");
  });

  // highlight default if no wallpaper selected
  if (!currentWallpaper) whiteSquare.classList.add("selected");
}

renderWallpaperPreviews();

// Upload new wallpaper
wallpaperInput.addEventListener("change", () => {
  const file = wallpaperInput.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    savedWallpapers.push(dataUrl);
    localStorage.setItem("chatWallpapers", JSON.stringify(savedWallpapers));
    currentWallpaper = dataUrl;
    localStorage.setItem("chatWallpaper", currentWallpaper);
    chatPreview.style.backgroundImage = `url(${dataUrl})`;
    chatPreview.style.backgroundColor = '';
    renderWallpaperPreviews();
  };
  reader.readAsDataURL(file);
});

/* INIT */
updateThemeUI();
if(currentWallpaper) chatPreview.style.backgroundImage = `url(${currentWallpaper})`;
else chatPreview.style.backgroundColor = 'white';
</script>

</body>
</html>
