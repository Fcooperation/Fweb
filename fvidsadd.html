<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FVID Camera</title>
<link rel="stylesheet" href="fvidsadd.css">
</head>

<body>

<!-- CAMERA -->
<div id="camera-container">
  <video id="camera" autoplay playsinline></video>
</div>

<!-- PREVIEW -->
<div id="preview-screen">

  <video
    id="preview-video"
    controls
    playsinline>
  </video>

</div>

<!-- CONTROL BAR -->
<div id="controls">

  <button id="upload-btn">⬆ Upload</button>

  <button id="record-btn">● Record</button>

  <button id="switch-btn">🔄 Flip</button>

  <button id="post-btn">Post</button>

</div>

<script src="fvidsadd.js"></script>
</body>
</html>
