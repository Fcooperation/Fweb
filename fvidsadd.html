<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FVID Camera</title>
<link rel="stylesheet" href="fvidsadd.css">
</head>

<body>

<!-- CAMERA -->
<div id="camera-container">
  <video id="camera" autoplay playsinline></video>
</div>

<!-- PREVIEW -->
<div id="preview-screen">

  <video
    id="preview-video"
    controls
    playsinline>
  </video>
  <button id="cancel-preview">✕ Cancel</button>
  
    <!-- OVERLAY (blocks everything) -->
<div id="upload-overlay" class="hidden"></div>

<!-- DETAILS BOTTOM SHEET -->
<div id="details-sheet" class="hidden">

  <h3>Complete Upload</h3>

  <div id="category-trigger" class="category-trigger">
  Select Category
</div>

<input type="hidden" id="category" value="tutorial">

<div class="category-grid" id="category-grid">

  <button class="category-card active" data-value="animation">
    <span class="emoji">🎞️</span>
    <span class="name">Animation</span>
  </button>

  <button class="category-card" data-value="animals">
    <span class="emoji">🐾</span>
    <span class="name">Animals</span>
  </button>

  <button class="category-card" data-value="art">
    <span class="emoji">🎨</span>
    <span class="name">Art</span>
  </button>

  <button class="category-card" data-value="beauty">
    <span class="emoji">💄</span>
    <span class="name">Beauty</span>
  </button>

  <button class="category-card" data-value="business">
    <span class="emoji">💼</span>
    <span class="name">Business</span>
  </button>

  <button class="category-card" data-value="comedy">
    <span class="emoji">😂</span>
    <span class="name">Comedy</span>
  </button>

  <button class="category-card" data-value="cooking">
    <span class="emoji">👨‍🍳</span>
    <span class="name">Cooking</span>
  </button>

  <button class="category-card" data-value="diy">
    <span class="emoji">🛠️</span>
    <span class="name">DIY</span>
  </button>

  <button class="category-card" data-value="education">
    <span class="emoji">📚</span>
    <span class="name">Education</span>
  </button>

  <button class="category-card" data-value="fashion">
    <span class="emoji">👗</span>
    <span class="name">Fashion</span>
  </button>

  <button class="category-card" data-value="finance">
    <span class="emoji">💰</span>
    <span class="name">Finance</span>
  </button>

  <button class="category-card" data-value="fitness">
    <span class="emoji">💪</span>
    <span class="name">Fitness</span>
  </button>

  <button class="category-card" data-value="food">
    <span class="emoji">🍔</span>
    <span class="name">Food</span>
  </button>

  <button class="category-card" data-value="gaming">
    <span class="emoji">🎮</span>
    <span class="name">Gaming</span>
  </button>

  <button class="category-card" data-value="health">
    <span class="emoji">🩺</span>
    <span class="name">Health</span>
  </button>

  <button class="category-card" data-value="lifestyle">
    <span class="emoji">✨</span>
    <span class="name">Lifestyle</span>
  </button>

  <button class="category-card" data-value="motivation">
    <span class="emoji">🚀</span>
    <span class="name">Motivation</span>
  </button>

  <button class="category-card" data-value="movies">
    <span class="emoji">🎬</span>
    <span class="name">Movies</span>
  </button>

  <button class="category-card" data-value="music">
    <span class="emoji">🎵</span>
    <span class="name">Music</span>
  </button>

  <button class="category-card" data-value="news">
    <span class="emoji">📰</span>
    <span class="name">News</span>
  </button>

  <button class="category-card" data-value="photography">
    <span class="emoji">📸</span>
    <span class="name">Photography</span>
  </button>

  <button class="category-card" data-value="programming">
    <span class="emoji">💻</span>
    <span class="name">Programming</span>
  </button>

  <button class="category-card" data-value="science">
    <span class="emoji">🔬</span>
    <span class="name">Science</span>
  </button>

  <button class="category-card" data-value="sports">
    <span class="emoji">⚽</span>
    <span class="name">Sports</span>
  </button>

  <button class="category-card" data-value="technology">
    <span class="emoji">📱</span>
    <span class="name">Technology</span>
  </button>

  <button class="category-card" data-value="travel">
    <span class="emoji">✈️</span>
    <span class="name">Travel</span>
  </button>

  <button class="category-card" data-value="tutorial">
    <span class="emoji">🎓</span>
    <span class="name">Tutorial</span>
  </button>

</div>
  <div id="selected-category-text" class="selected-category-text"></div>

  <div id="language-trigger" class="category-trigger">
  Select Language
</div>

<input type="hidden" id="language">

<div class="language-grid" id="language-grid">

  <button class="language-card" data-value="english">
    <span class="emoji">🇬🇧</span>
    <span class="name">English</span>
  </button>

  <button class="language-card" data-value="pidgin">
    <span class="emoji">🗣️</span>
    <span class="name">Pidgin</span>
  </button>

  <button class="language-card" data-value="igbo">
    <span class="emoji">🟢</span>
    <span class="name">Igbo</span>
  </button>

  <button class="language-card" data-value="yoruba">
    <span class="emoji">🟡</span>
    <span class="name">Yoruba</span>
  </button>

  <button class="language-card" data-value="hausa">
    <span class="emoji">⚪</span>
    <span class="name">Hausa</span>
  </button>

  <button class="language-card" data-value="french">
    <span class="emoji">🇫🇷</span>
    <span class="name">French</span>
  </button>

  <button class="language-card" data-value="spanish">
    <span class="emoji">🇪🇸</span>
    <span class="name">Spanish</span>
  </button>

  <button class="language-card" data-value="arabic">
    <span class="emoji">🇸🇦</span>
    <span class="name">Arabic</span>
  </button>

</div>

<div id="selected-language-text"
     class="selected-category-text">
</div>

  

  <div class="field-group">

  <label for="hashtags-input">Hashtags</label>

  <div id="hashtags-container" class="hashtags-container">

    <div id="hashtags-list" class="hashtags-list"></div>

    <input
      id="hashtags-input"
      type="text"
      placeholder="Type a hashtag and press space"
      maxlength="30"
      autocomplete="off"
    >

  </div>

  <div id="hashtags-count" class="helper-text">
    0 / 10 hashtags
  </div>

</div>

  <div class="field-group">

  <label for="details">Description</label>

  <textarea
    id="details"
    maxlength="500"
    placeholder="Describe your video..."
  ></textarea>

  <div id="details-count" class="helper-text">
    0 / 500
  </div>

</div>

  <button id="confirm-upload">Post Video</button>
</div>

<!-- LOADING SCREEN -->
<div id="upload-loader" class="hidden">
  <div class="loader-balls">
    <div></div><div></div><div></div>
  </div>

  <div id="upload-percent">0%</div>
</div>


</div>


<!-- CONTROL BAR -->
<div id="controls">

  <button id="upload-btn">⬆ Upload</button>

  <button id="record-btn">● Record</button>

  <button id="switch-btn">🔄 Flip</button>

  <button id="post-btn">Post</button>
</div>
  
<script src="fvidsadd.js"></script>
</body>
</html>
