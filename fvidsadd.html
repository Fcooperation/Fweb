<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FVID Camera</title>
<link rel="stylesheet" href="fvidsadd.css">
</head>

<body>

<!-- CAMERA -->
<div id="camera-container">
  <video id="camera" autoplay playsinline></video>
</div>

<!-- PREVIEW -->
<div id="preview-screen">

  <video
    id="preview-video"
    controls
    playsinline>
  </video>
  <button id="cancel-preview">✕ Cancel</button>

</div>

<!-- CONTROL BAR -->
<div id="controls">

  <button id="upload-btn">⬆ Upload</button>

  <button id="record-btn">● Record</button>

  <button id="switch-btn">🔄 Flip</button>

  <button id="post-btn">Post</button>

</div>

<script src="fvidsadd.js"></script>
<!-- OVERLAY (blocks everything) -->
<div id="upload-overlay" class="hidden"></div>

<!-- DETAILS BOTTOM SHEET -->
<div id="details-sheet" class="hidden">

  <h3>Complete Upload</h3>

  <select id="category">
    <option value="">Select Category</option>
    <option>Comedy</option>
    <option>Gaming</option>
    <option>Education</option>
    <option>Music</option>
    <option>Vlog</option>
  </select>

  <select id="language">
    <option value="">Select Language</option>
    <option>English</option>
    <option>Pidgin</option>
    <option>Yoruba</option>
    <option>Igbo</option>
  </select>

  <input id="hashtags" placeholder="hashtags (comma separated)" />
  <textarea id="details" placeholder="video details"></textarea>

  <button id="confirm-upload">Post Video</button>
</div>

<!-- LOADING SCREEN -->
<div id="upload-loader" class="hidden">
  <div class="loader-balls">
    <div></div><div></div><div></div>
  </div>

  <div id="upload-percent">0%</div>
</div>
</body>
</html>
