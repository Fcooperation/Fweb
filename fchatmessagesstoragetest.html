<!DOCTYPE html>
<html>
<head>
  <title>FChat Messages Test</title>

  <style>
    body{
      font-family:Arial;
      background:#f5f5f5;
      padding:20px;
    }

    pre{
      background:white;
      padding:15px;
      border-radius:10px;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>

<h2>fchat_messages Storage</h2>

<pre id="output">Loading...</pre>

<script>

const messages =
  JSON.parse(
    localStorage.getItem("fchat_messages")
  ) || [];

document.getElementById("output").textContent =
  JSON.stringify(messages, null, 2);

console.log(messages);

</script>

</body>
</html>
